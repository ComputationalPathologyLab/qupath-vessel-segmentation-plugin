plugins {
    id 'java'
}

group = "com.rashid.qupath"
version = "0.0.1"

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven { url "https://maven.scijava.org/content/repositories/releases/" }
    maven { url "https://maven.scijava.org/content/repositories/public/" }
}

def javafxVersion = "21.0.2"
def javafxPlatform = "mac-aarch64"

dependencies {
    compileOnly "io.github.qupath:qupath-gui-fx:0.6.0"
    compileOnly "org.openjfx:javafx-base:${javafxVersion}:${javafxPlatform}"
    compileOnly "org.openjfx:javafx-graphics:${javafxVersion}:${javafxPlatform}"
    compileOnly "org.openjfx:javafx-controls:${javafxVersion}:${javafxPlatform}"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

jar {
    archiveBaseName.set("qupath-extension-vessel-segmentation-annotation")
}